<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверяем оплату — КнопкА</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d; color: #e8e8e8;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: #111; border-bottom: 1px solid #1e1e1e;
      padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    }
    header .logo {
      width: 36px; height: 36px; background: #00c853; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: #0d0d0d;
    }
    header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }
    .card {
      background: #161616; border: 1px solid #1e1e1e; border-radius: 20px;
      padding: 48px 40px; max-width: 440px; width: 100%; text-align: center;
    }
    .spinner {
      width: 56px; height: 56px; margin: 0 auto 24px;
      border: 4px solid #1e1e1e;
      border-top-color: #00c853;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    .sub { font-size: 15px; color: #666; line-height: 1.6; }
    footer {
      background: #111; border-top: 1px solid #1e1e1e;
      padding: 16px 24px; text-align: center; font-size: 13px; color: #444;
    }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo">A</div>
    <h1>КнопкА</h1>
  </div>
</header>

<div class="main">
  <div class="card">
    <div class="spinner"></div>
    <h2>Проверяем оплату…</h2>
    <p class="sub">Это займёт пару секунд</p>
  </div>
</div>

<footer>© 2026 КнопкА</footer>

<script>
  const MAX_ATTEMPTS  = 5;
  const INTERVAL_MS   = 3000;  // пауза между попытками
  const FETCH_TIMEOUT = 3000;  // таймаут одного запроса — итого max ~15с

  const params   = new URLSearchParams(window.location.search);
  const deviceId = params.get("device_id");
  const apiBase  = params.get("api_base") ?? "https://avpn-proxy.mrs885.workers.dev";

  if (!deviceId) {
    window.location.href = "/notfound.html";
  } else {
    checkPayment(1);
  }

  async function fetchWithTimeout(url, timeoutMs) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const resp = await fetch(url, { signal: controller.signal });
      return resp;
    } finally {
      clearTimeout(timer);
    }
  }

  async function checkPayment(attempt) {
    try {
      const resp = await fetchWithTimeout(
        `${apiBase}/api/payment/today?device_id=${encodeURIComponent(deviceId)}`,
        FETCH_TIMEOUT
      );
      const data = await resp.json();

      if (data.found) {
        window.location.href = "/found.html?device_id=" + encodeURIComponent(deviceId);
        return;
      }
    } catch (e) {
      // fetch завис или сеть недоступна — AbortController прервал, идём дальше
    }

    if (attempt < MAX_ATTEMPTS) {
      setTimeout(() => checkPayment(attempt + 1), INTERVAL_MS);
    } else {
      window.location.href = "/notfound.html?device_id=" + encodeURIComponent(deviceId);
    }
  }
</script>

</body>
</html>
