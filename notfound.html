<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Платёж не найден — КнопкА</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d; color: #e8e8e8;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: #111; border-bottom: 1px solid #1e1e1e;
      padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    }
    header .logo {
      width: 36px; height: 36px; background: #00c853; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: #0d0d0d;
    }
    header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }
    .card {
      background: #161616; border: 1px solid #1e1e1e; border-radius: 20px;
      padding: 48px 40px; max-width: 440px; width: 100%; text-align: center;
    }
    .icon {
      width: 72px; height: 72px; background: #ffffff10; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 36px;
    }
    h2 { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 12px; }
    .sub { font-size: 16px; color: #888; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-block; background: #00c853; color: #000;
      font-weight: 700; font-size: 16px; padding: 14px 32px;
      border-radius: 12px; text-decoration: none; margin-bottom: 24px;
      border: none; cursor: pointer; width: 100%;
    }
    .btn:disabled {
      background: #333; color: #666; cursor: not-allowed;
    }
    .support { font-size: 13px; color: #555; }
    .support a { color: #00c853; text-decoration: none; }
    footer {
      background: #111; border-top: 1px solid #1e1e1e;
      padding: 16px 24px; text-align: center; font-size: 13px; color: #444;
    }
  </style>
</head>
<body>

<header>
  <a href="https://testflight.apple.com/join/66AbtsBG" target="_blank" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
    <div class="logo">A</div>
    <h1>КнопкА</h1>
  </a>
</header>

<div class="main">
  <div class="card">
    <div class="icon" id="status-icon">🔍</div>
    <h2 id="status-title">Платёж не найден</h2>
    <p class="sub" id="status-sub">Похоже, оплата ещё не подтверждена. Если вы только что оплатили — нажмите кнопку ниже, мы проверим ещё раз.</p>

    <button class="btn" id="retry-btn" onclick="recheck()">Проверить снова</button>

    <p class="support" id="support-msg">
      Оплатили, но платёж не находится?<br>
      Напишите нам: <a href="mailto:knopka-supp@mail.ru">knopka-supp@mail.ru</a>
    </p>
  </div>
</div>

<footer>© 2026 КнопкА</footer>

<script>
  const WORKER = "https://avpn-prod.mrs885.workers.dev";
  const FETCH_TIMEOUT = 3000;

  const params = new URLSearchParams(window.location.search);
  const deviceId = params.get("device_id");

  async function fetchWithTimeout(url, timeoutMs) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      return await fetch(url, { signal: controller.signal });
    } finally {
      clearTimeout(timer);
    }
  }

  async function recheck() {
    if (!deviceId) return;

    const btn   = document.getElementById("retry-btn");
    const icon  = document.getElementById("status-icon");
    const title = document.getElementById("status-title");
    const sub   = document.getElementById("status-sub");

    btn.disabled = true;
    btn.textContent = "Проверяем…";
    icon.textContent = "⏳";

    try {
      const resp = await fetchWithTimeout(
        `${WORKER}/api/payment/today?device_id=${encodeURIComponent(deviceId)}`,
        FETCH_TIMEOUT
      );
      const data = await resp.json();

      if (data.found) {
        window.location.href = "/found.html?device_id=" + encodeURIComponent(deviceId);
        return;
      }
    } catch (e) {
      // fetch завис или сеть недоступна
    }

    icon.textContent = "🔍";
    title.textContent = "Платёж пока не найден";
    sub.textContent = "Платёж ещё не подтверждён банком. Подождите немного и попробуйте ещё раз. Если вы не завершали оплату — можете закрыть эту страницу.";
    btn.disabled = false;
    btn.textContent = "Проверить снова";
  }
</script>

</body>
</html>
