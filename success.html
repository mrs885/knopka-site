<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата прошла — КнопкА</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d; color: #e8e8e8;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    header {
      background: #111; border-bottom: 1px solid #1e1e1e;
      padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    }
    header .logo {
      width: 36px; height: 36px; background: #00c853; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: #0d0d0d;
    }
    header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    .main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 48px 24px;
    }
    .card {
      background: #161616; border: 1px solid #1e1e1e; border-radius: 20px;
      padding: 48px 40px; max-width: 440px; width: 100%; text-align: center;
    }
    .check {
      width: 72px; height: 72px; background: #00c85320; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; font-size: 36px;
    }
    h2 { font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 12px; }
    .sub { font-size: 16px; color: #888; margin-bottom: 32px; line-height: 1.6; }
    .steps-mini {
      background: #1a1a1a; border-radius: 12px; padding: 20px 24px;
      text-align: left; margin-bottom: 32px;
    }
    .steps-mini p {
      font-size: 14px; color: #ccc; padding: 6px 0;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .steps-mini .num {
      min-width: 22px; height: 22px; background: #00c853; border-radius: 50%;
      color: #000; font-weight: 800; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-top: 1px;
    }
    .support { font-size: 13px; color: #555; }
    .support a { color: #00c853; text-decoration: none; }
    footer {
      background: #111; border-top: 1px solid #1e1e1e;
      padding: 16px 24px; text-align: center; font-size: 13px; color: #444;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">A</div>
  <h1>КнопкА</h1>
</header>

<div class="main">
  <div class="card">
    <div class="check">✅</div>
    <h2>Оплата прошла!</h2>
    <p class="sub">Подписка активирована. Вернись в приложение — пара кликов и всё готово.</p>

    <div class="steps-mini">
      <p><span class="num">1</span> Открой приложение КнопкА на iPhone</p>
      <p><span class="num">2</span> Перейди в <strong style="color:#fff">Настройки</strong></p>
      <p><span class="num">3</span> Нажми <strong style="color:#00c853">«Обновить статус подписки»</strong></p>
      <p><span class="num">4</span> Готово — подписка активна 🎉</p>
    </div>

    <p class="support">
      Что-то не так? Напиши нам:<br>
      <a href="mailto:knopka-supp@mail.ru">knopka-supp@mail.ru</a>
    </p>
  </div>
</div>

<footer>© 2026 КнопкА</footer>

</body>
</html>
